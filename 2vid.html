<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2vid · Persistent Link Two-Party Call</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --ok: #22c55e;
      --warn: #f59e0b;
      --off: #ef4444;
      --line: #334155;
      --btn: #1e293b;
      --btn-active: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    #app { display: grid; grid-template-rows: auto 1fr auto auto; min-height: 100%; }
    header { display: grid; gap: .5rem; padding: .75rem; border-bottom: 1px solid var(--line); background: #020617; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; }
    .name-input, .link-input { background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: .5rem; padding: .5rem .625rem; }
    .name-input { width: 12rem; }
    .link-input { flex: 1; min-width: 12rem; }
    .presence { display: inline-flex; align-items: center; gap: .375rem; font-size: .875rem; color: var(--muted); }
    .dot { width: .6rem; height: .6rem; border-radius: 999px; background: #64748b; }
    .dot.online { background: var(--ok); }
    .dot.in_call { background: var(--btn-active); }
    .split { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; min-height: 0; }
    @media (min-width: 900px) and (orientation: landscape) {
      .split { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    }
    .pane { position: relative; border: 1px solid var(--line); margin: .5rem; border-radius: .75rem; overflow: hidden; background: #020617; min-height: 12rem; }
    video { width: 100%; height: 100%; object-fit: cover; background: #020617; }
    .placeholder { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); font-size: .9rem; background: rgba(2,6,23,.66); }
    .label { position: absolute; top: .5rem; left: .5rem; background: rgba(15,23,42,.8); border: 1px solid var(--line); border-radius: .4rem; padding: .2rem .4rem; font-size: .75rem; }
    .controls { display: flex; flex-wrap: wrap; gap: .5rem; padding: .75rem; border-top: 1px solid var(--line); background: #020617; }
    button { background: var(--btn); border: 1px solid var(--line); color: var(--text); border-radius: .5rem; padding: .5rem .75rem; cursor: pointer; }
    button.on { background: var(--btn-active); }
    button.off { background: #3f1d1d; border-color: #7f1d1d; }
    .transcript-wrap { border-top: 1px solid var(--line); display: grid; grid-template-rows: auto 1fr; min-height: 10rem; max-height: 35vh; }
    .transcript-wrap.hidden { display: none; }
    .transcript-head { display: flex; gap: .5rem; align-items: center; padding: .5rem .75rem; background: #020617; }
    .transcript { overflow: auto; padding: .5rem .75rem; font-size: .875rem; }
    .entry { border-bottom: 1px solid #1f2937; padding: .35rem 0; }
    .entry small { color: var(--muted); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="row">
      <strong>2vid</strong>
      <span style="color:var(--muted);font-size:.9rem">Persistent-link, two-party call surface</span>
    </div>
    <div class="row">
      <label>Me <input id="localName" class="name-input" maxlength="40" /></label>
      <label>My language
        <select id="localLang" class="name-input"></select>
      </label>
      <div>Remote: <span id="remoteName">Waiting…</span></div>
      <div>Remote language: <span id="remoteLang">—</span></div>
      <div class="presence"><span id="presenceDot" class="dot"></span><span id="presenceText">remote offline</span></div>
    </div>
    <div class="row">
      <input id="callLink" class="link-input" readonly />
      <button id="copyLink">Copy link</button>
    </div>
  </header>

  <main class="split">
    <section class="pane">
      <span class="label">Local</span>
      <video id="localVideo" autoplay playsinline muted></video>
      <div id="localPlaceholder" class="placeholder">Local camera off</div>
    </section>
    <section class="pane">
      <span class="label">Remote</span>
      <video id="remoteVideo" autoplay playsinline></video>
      <div id="remotePlaceholder" class="placeholder">Remote not in call</div>
    </section>
  </main>

  <section class="controls">
    <button id="callBtn">Call On</button>
    <button id="camBtn">Camera Off</button>
    <button id="micBtn">Mic Off</button>
    <button id="ccBtn">CC Off</button>
    <button id="toggleTranscriptBtn" class="on">Transcript Open</button>
    <button id="exportTxt">Export Text</button>
    <button id="exportJson">Export JSON</button>
  </section>

  <section id="transcriptWrap" class="transcript-wrap">
    <div class="transcript-head"><strong>Transcript</strong><span style="color:var(--muted);font-size:.85rem">video_surface only</span></div>
    <div id="transcript" class="transcript"></div>
  </section>
</div>

<script>
(() => {
  const MAX_KEYS = 600;
  const TTL_MS = 90_000;
  const TRANSCRIPT_LIMIT = 400;
  const DISCONNECT_GRACE_MS = 7_000;

  const q = (id) => document.getElementById(id);
  const ui = {
    localName: q('localName'), remoteName: q('remoteName'), callLink: q('callLink'), copyLink: q('copyLink'),
    localLang: q('localLang'), remoteLang: q('remoteLang'),
    presenceDot: q('presenceDot'), presenceText: q('presenceText'), localVideo: q('localVideo'), remoteVideo: q('remoteVideo'),
    localPlaceholder: q('localPlaceholder'), remotePlaceholder: q('remotePlaceholder'), callBtn: q('callBtn'), camBtn: q('camBtn'),
    micBtn: q('micBtn'), ccBtn: q('ccBtn'), toggleTranscriptBtn: q('toggleTranscriptBtn'), exportTxt: q('exportTxt'), exportJson: q('exportJson'),
    transcriptWrap: q('transcriptWrap'), transcript: q('transcript')
  };

  const id = () => (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);
  const now = () => Date.now();
  const LANGS = [
    ['auto', 'Auto'], ['en', 'English'], ['es', 'Spanish'], ['fr', 'French'], ['de', 'German'],
    ['it', 'Italian'], ['pt', 'Portuguese'], ['ja', 'Japanese'], ['ko', 'Korean'], ['zh', 'Chinese']
  ];
  const trCache = new Map();

  function makeCache() {
    const m = new Map();
    return {
      seen(key) {
        const t = m.get(key);
        if (!t) return false;
        if (now() - t > TTL_MS) { m.delete(key); return false; }
        return true;
      },
      add(key) {
        m.set(key, now());
        if (m.size > MAX_KEYS) {
          const entries = [...m.entries()].sort((a,b) => a[1]-b[1]);
          for (let i = 0; i < entries.length - MAX_KEYS; i++) m.delete(entries[i][0]);
        }
      },
      sweep() { for (const [k, t] of m) if (now() - t > TTL_MS) m.delete(k); }
    };
  }

  const dedupe = { desc: makeCache(), ice: makeCache(), status: makeCache(), cc: makeCache() };

  const params = new URLSearchParams(location.search);
  const sessionId = params.get('session') || id().slice(0, 8);
  if (!params.get('session')) {
    params.set('session', sessionId);
    history.replaceState({}, '', `${location.pathname}?${params.toString()}`);
  }
  const selfId = id().slice(0, 8);
  const callLink = location.href;

  const state = {
    session: {
      sessionId,
      callLink,
      localName: localStorage.getItem('2vid.localName') || 'Me',
      remoteName: 'Unknown',
      localLang: localStorage.getItem('2vid.localLang') || 'auto',
      remoteLang: 'auto'
    },
    presence: { local: 'online', remote: 'offline' },
    call: { state: 'ready', joined: false },
    media: { cameraOn: false, micOn: false, remoteCameraOn: false, remoteMicOn: false },
    webrtc: { pc: null, makingOffer: false, retryQueued: false, retryTimer: null, disconnectGraceTimer: null },
    cc: { enabled: false, recognitionActive: false, opLock: false },
    transcript: { entries: [], visible: true }
  };

  const signalKey = (sid) => `2vid.signal.${sid}`;
  const chan = ('BroadcastChannel' in window) ? new BroadcastChannel(`2vid-${sessionId}`) : null;
  let recognizer = null;
  let localStream = null;
  let remoteStream = new MediaStream();
  ui.remoteVideo.srcObject = remoteStream;

  function assertState() {
    if (!['idle','ready','in_call'].includes(state.call.state)) state.call.state = 'ready';
    state.media.cameraOn = !!state.media.cameraOn;
    state.media.micOn = !!state.media.micOn;
    state.media.remoteCameraOn = !!state.media.remoteCameraOn;
    state.media.remoteMicOn = !!state.media.remoteMicOn;
  }

  function uiFromState() {
    assertState();
    ui.localName.value = state.session.localName;
    ui.remoteName.textContent = state.session.remoteName || 'Unknown';
    ui.remoteLang.textContent = state.session.remoteLang || 'auto';
    ui.callLink.value = state.session.callLink;
    ui.localLang.value = state.session.localLang;
    ui.presenceDot.className = `dot ${state.presence.remote === 'in_call' ? 'in_call' : state.presence.remote === 'online' ? 'online' : ''}`;
    ui.presenceText.textContent = `remote ${state.presence.remote}`;

    const callOn = state.call.joined;
    ui.callBtn.textContent = callOn ? 'Call Off' : 'Call On';
    ui.callBtn.className = callOn ? 'off' : 'on';

    ui.camBtn.textContent = state.media.cameraOn ? 'Camera On' : 'Camera Off';
    ui.camBtn.className = state.media.cameraOn ? 'on' : '';

    ui.micBtn.textContent = state.media.micOn ? 'Mic On' : 'Mic Off';
    ui.micBtn.className = state.media.micOn ? 'on' : '';

    ui.ccBtn.textContent = state.cc.enabled ? 'CC On' : 'CC Off';
    ui.ccBtn.className = state.cc.enabled ? 'on' : '';

    ui.toggleTranscriptBtn.textContent = state.transcript.visible ? 'Transcript Open' : 'Transcript Closed';
    ui.toggleTranscriptBtn.className = state.transcript.visible ? 'on' : '';
    ui.transcriptWrap.className = `transcript-wrap ${state.transcript.visible ? '' : 'hidden'}`;

    ui.localPlaceholder.style.display = state.media.cameraOn ? 'none' : 'grid';
    const remoteActive = state.call.joined && (state.media.remoteCameraOn || state.media.remoteMicOn || state.presence.remote === 'in_call');
    ui.remotePlaceholder.style.display = remoteActive ? 'none' : 'grid';
  }

  function postEvent(type, payload = {}) {
    const evt = { type, sessionId: state.session.sessionId, eventId: id(), from: selfId, ts: now(), payload };
    const encoded = JSON.stringify(evt);
    localStorage.setItem(signalKey(sessionId), encoded);
    if (chan) chan.postMessage(evt);
  }

  function dedupeCheck(bucket, evt) {
    const key = `${evt.sessionId}|${evt.from}|${evt.eventId}`;
    if (dedupe[bucket].seen(key)) return true;
    dedupe[bucket].add(key);
    return false;
  }

  async function ensureLocalStream() {
    if (localStream) return localStream;
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    localStream.getVideoTracks().forEach(t => t.enabled = state.media.cameraOn);
    localStream.getAudioTracks().forEach(t => t.enabled = state.media.micOn);
    ui.localVideo.srcObject = localStream;
    return localStream;
  }

  function ensurePeerConnection() {
    if (state.webrtc.pc) return state.webrtc.pc;
    const pc = new RTCPeerConnection();
    state.webrtc.pc = pc;

    pc.onicecandidate = (e) => {
      if (!e.candidate) return;
      postEvent('webrtc-ice', { candidate: e.candidate.toJSON() });
    };

    pc.ontrack = (e) => {
      remoteStream = e.streams[0] || remoteStream;
      ui.remoteVideo.srcObject = remoteStream;
      const hasV = remoteStream.getVideoTracks().some(t => t.readyState === 'live');
      const hasA = remoteStream.getAudioTracks().some(t => t.readyState === 'live');
      state.media.remoteCameraOn = hasV;
      state.media.remoteMicOn = hasA;
      uiFromState();
    };

    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      if (s === 'connected') {
        clearTimeout(state.webrtc.disconnectGraceTimer);
        state.webrtc.disconnectGraceTimer = null;
      } else if (s === 'disconnected') {
        clearTimeout(state.webrtc.disconnectGraceTimer);
        state.webrtc.disconnectGraceTimer = setTimeout(() => {
          state.media.remoteCameraOn = false;
          state.media.remoteMicOn = false;
          uiFromState();
        }, DISCONNECT_GRACE_MS);
      } else if (s === 'failed' || s === 'closed') {
        clearTimeout(state.webrtc.disconnectGraceTimer);
        state.media.remoteCameraOn = false;
        state.media.remoteMicOn = false;
        uiFromState();
      }
    };
    return pc;
  }

  async function syncLocalTracksToPeer() {
    const pc = ensurePeerConnection();
    const stream = await ensureLocalStream();
    const wanted = stream.getTracks().filter(t => (t.kind === 'video' ? state.media.cameraOn : state.media.micOn));
    const senders = pc.getSenders().filter(s => s.track);
    const senderByKind = new Map(senders.map(s => [s.track.kind, s]));

    let changed = false;
    for (const kind of ['video', 'audio']) {
      const desired = wanted.find(t => t.kind === kind) || null;
      const sender = senderByKind.get(kind);
      if (sender && !desired) { pc.removeTrack(sender); changed = true; }
      if (!sender && desired) { pc.addTrack(desired, stream); changed = true; }
      if (sender && desired && sender.track !== desired) { await sender.replaceTrack(desired); changed = true; }
    }
    return changed;
  }

  async function maybeStartOffer(reason = 'unknown') {
    const pc = ensurePeerConnection();
    if (!['ready','in_call'].includes(state.call.state)) return;
    if (pc.signalingState !== 'stable' || state.webrtc.makingOffer) {
      if (!state.webrtc.retryQueued) {
        state.webrtc.retryQueued = true;
        clearTimeout(state.webrtc.retryTimer);
        state.webrtc.retryTimer = setTimeout(() => {
          state.webrtc.retryQueued = false;
          maybeStartOffer(`retry:${reason}`);
        }, 250);
      }
      return;
    }

    state.webrtc.makingOffer = true;
    try {
      const changed = await syncLocalTracksToPeer();
      if (!changed && reason !== 'force') return;
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      postEvent('webrtc-description', { description: pc.localDescription });
    } finally {
      state.webrtc.makingOffer = false;
    }
  }

  async function handleDescription(evt) {
    if (dedupeCheck('desc', evt)) return;
    const pc = ensurePeerConnection();
    const desc = evt.payload?.description;
    if (!desc) return;
    const polite = selfId > evt.from;
    const offerCollision = desc.type === 'offer' && (state.webrtc.makingOffer || pc.signalingState !== 'stable');
    if (offerCollision && !polite) return;

    await pc.setRemoteDescription(desc);
    if (desc.type === 'offer') {
      await syncLocalTracksToPeer();
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      postEvent('webrtc-description', { description: pc.localDescription });
    }
  }

  async function handleIce(evt) {
    if (dedupeCheck('ice', evt)) return;
    const cand = evt.payload?.candidate;
    if (!cand) return;
    try { await ensurePeerConnection().addIceCandidate(cand); } catch (_) {}
  }

  function appendTranscript(entry) {
    state.transcript.entries.push(entry);
    if (state.transcript.entries.length > TRANSCRIPT_LIMIT) {
      state.transcript.entries.splice(0, state.transcript.entries.length - TRANSCRIPT_LIMIT);
    }
    const el = document.createElement('div');
    el.className = 'entry';
    el.innerHTML = `<div><small>${new Date(entry.ts).toLocaleTimeString()} • ${entry.dir}</small></div><div>${entry.sourceText}</div><div style="color:#93c5fd">${entry.targetText}</div>`;
    ui.transcript.appendChild(el);
    ui.transcript.scrollTop = ui.transcript.scrollHeight;
  }

  async function translate(text, from, to) {
    const raw = (text || '').trim();
    if (!raw) return '';
    const src = from && from !== 'auto' ? from : (state.session.localLang || 'en');
    const tgt = to && to !== 'auto' ? to : (state.session.remoteLang || 'en');
    if (!src || !tgt || src === tgt) return raw;
    const key = `${src}|${tgt}|${raw}`;
    if (trCache.has(key)) return trCache.get(key);
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(raw)}&langpair=${encodeURIComponent(src)}|${encodeURIComponent(tgt)}`;
      const res = await fetch(url);
      const data = await res.json();
      const out = data?.responseStatus === 200 ? (data?.responseData?.translatedText || raw) : raw;
      trCache.set(key, out || raw);
      if (trCache.size > 300) trCache.delete(trCache.keys().next().value);
      return out || raw;
    } catch (_) {
      return raw;
    }
  }

  async function emitLocalTranscript(text) {
    if (!text.trim()) return;
    const sourceLang = state.session.localLang || 'auto';
    const targetLang = state.session.remoteLang || 'auto';
    const targetText = await translate(text, sourceLang, targetLang);
    const entry = { dir: 'local_to_remote', sourceText: text, targetText, ts: now(), sourceLang, targetLang, origin: 'video_surface' };
    appendTranscript(entry);
    postEvent('cc-transcript', { entry });
  }

  function handleRemoteTranscript(evt) {
    if (dedupeCheck('cc', evt)) return;
    const incoming = evt.payload?.entry;
    if (!incoming || incoming.origin !== 'video_surface') return;
    const sourceText = incoming.sourceText || '';
    const src = incoming.sourceLang || state.session.remoteLang || 'auto';
    const tgt = state.session.localLang || 'auto';
    translate(sourceText, src, tgt).then((targetText) => {
      appendTranscript({
        ...incoming,
        dir: 'remote_to_local',
        sourceLang: src,
        targetLang: tgt,
        targetText: targetText || sourceText
      });
    });
  }

  function startCCCapture() {
    if (!state.cc.enabled || state.cc.recognitionActive) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognizer = new SR();
    recognizer.continuous = true;
    recognizer.interimResults = false;
    recognizer.lang = state.session.localLang === 'auto' ? (navigator.language || 'en-US') : state.session.localLang;
    recognizer.onresult = (ev) => {
      const result = ev.results[ev.results.length - 1];
      if (result && result.isFinal) emitLocalTranscript(result[0].transcript || '');
    };
    recognizer.onend = () => {
      state.cc.recognitionActive = false;
      if (state.cc.enabled) startCCCapture();
    };
    recognizer.start();
    state.cc.recognitionActive = true;
  }

  function stopCCCapture() {
    if (!recognizer) return;
    recognizer.onend = null;
    recognizer.stop();
    recognizer = null;
    state.cc.recognitionActive = false;
  }

  async function toggleCC(enabled) {
    if (state.cc.opLock) return;
    state.cc.opLock = true;
    try {
      const target = !!enabled;
      if (state.cc.enabled === target) return;
      state.cc.enabled = target;
      if (target) startCCCapture();
      else stopCCCapture();
    } finally {
      state.cc.opLock = false;
      uiFromState();
    }
  }

  async function joinCall() {
    if (state.call.joined) return;
    state.call.joined = true;
    state.call.state = 'in_call';
    state.presence.local = 'in_call';
    await ensureLocalStream();
    ensurePeerConnection();
    postEvent('call-on', { cameraOn: state.media.cameraOn, micOn: state.media.micOn, name: state.session.localName, lang: state.session.localLang });
    postEvent('presence', { status: state.presence.local, name: state.session.localName, lang: state.session.localLang });
    await maybeStartOffer('join');
    uiFromState();
  }

  function teardownCallMedia() {
    if (localStream) {
      for (const t of localStream.getTracks()) t.stop();
      localStream = null;
      ui.localVideo.srcObject = null;
    }
    if (state.webrtc.pc) {
      state.webrtc.pc.onicecandidate = null;
      state.webrtc.pc.ontrack = null;
      state.webrtc.pc.onconnectionstatechange = null;
      state.webrtc.pc.close();
      state.webrtc.pc = null;
    }
    remoteStream = new MediaStream();
    ui.remoteVideo.srcObject = remoteStream;
  }

  function leaveCall() {
    if (!state.call.joined) return;
    state.call.joined = false;
    state.call.state = 'ready';
    state.presence.local = 'online';
    state.media.remoteCameraOn = false;
    state.media.remoteMicOn = false;
    stopCCCapture();
    teardownCallMedia();
    postEvent('call-off', { name: state.session.localName });
    postEvent('presence', { status: state.presence.local, name: state.session.localName, lang: state.session.localLang });
    uiFromState();
  }

  async function setCamera(next) {
    const val = !!next;
    if (state.media.cameraOn === val) return;
    state.media.cameraOn = val;
    if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = val);
    if (state.call.joined) await maybeStartOffer('camera');
    postEvent('presence', { status: state.presence.local, name: state.session.localName, lang: state.session.localLang, cameraOn: val, micOn: state.media.micOn });
    uiFromState();
  }

  async function setMic(next) {
    const val = !!next;
    if (state.media.micOn === val) return;
    state.media.micOn = val;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = val);
    if (state.call.joined) await maybeStartOffer('mic');
    postEvent('presence', { status: state.presence.local, name: state.session.localName, lang: state.session.localLang, cameraOn: state.media.cameraOn, micOn: val });
    uiFromState();
  }

  function exportText() {
    const entries = [...state.transcript.entries].sort((a,b) => a.ts - b.ts);
    return entries.map(e => `[${new Date(e.ts).toISOString()}] ${e.dir}: ${e.sourceText} => ${e.targetText}`).join('\n');
  }

  function exportJson() {
    const entries = [...state.transcript.entries].sort((a,b) => a.ts - b.ts)
      .map(({dir, sourceText, targetText, ts, sourceLang, targetLang}) => ({dir, sourceText, targetText, ts, sourceLang, targetLang}));
    return JSON.stringify({ source:'video_surface', sessionId: state.session.sessionId, callId: state.session.sessionId, entries }, null, 2);
  }

  function download(name, text, type) {
    const blob = new Blob([text], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function handleSignal(evt) {
    if (!evt || evt.sessionId !== state.session.sessionId || evt.from === selfId) return;
    if (!evt.type || !evt.eventId) return;

    if (['presence','call-on','call-off'].includes(evt.type) && dedupeCheck('status', evt)) return;

    if (evt.type === 'presence') {
      state.session.remoteName = evt.payload?.name || state.session.remoteName;
      state.session.remoteLang = evt.payload?.lang || state.session.remoteLang;
      if (evt.payload?.status) state.presence.remote = evt.payload.status;
      if (typeof evt.payload?.cameraOn === 'boolean') state.media.remoteCameraOn = evt.payload.cameraOn;
      if (typeof evt.payload?.micOn === 'boolean') state.media.remoteMicOn = evt.payload.micOn;
      uiFromState();
      return;
    }

    if (evt.type === 'call-on') {
      state.presence.remote = 'in_call';
      state.session.remoteName = evt.payload?.name || state.session.remoteName;
      state.session.remoteLang = evt.payload?.lang || state.session.remoteLang;
      if (typeof evt.payload?.cameraOn === 'boolean') state.media.remoteCameraOn = evt.payload.cameraOn;
      if (typeof evt.payload?.micOn === 'boolean') state.media.remoteMicOn = evt.payload.micOn;
      uiFromState();
      return;
    }

    if (evt.type === 'call-off') {
      state.presence.remote = 'online';
      state.media.remoteCameraOn = false;
      state.media.remoteMicOn = false;
      uiFromState();
      return;
    }

    if (evt.type === 'webrtc-description') return void handleDescription(evt);
    if (evt.type === 'webrtc-ice') return void handleIce(evt);
    if (evt.type === 'cc-transcript') return void handleRemoteTranscript(evt);
  }

  function onStorage(ev) {
    if (ev.key !== signalKey(sessionId) || !ev.newValue) return;
    try { handleSignal(JSON.parse(ev.newValue)); } catch (_) {}
  }

  ui.copyLink.onclick = async () => { try { await navigator.clipboard.writeText(state.session.callLink); } catch (_) {} };
  ui.localName.onchange = () => {
    const n = (ui.localName.value || '').trim().slice(0,40) || 'Me';
    if (n === state.session.localName) return;
    state.session.localName = n;
    localStorage.setItem('2vid.localName', n);
    postEvent('presence', { status: state.presence.local, name: n, lang: state.session.localLang, cameraOn: state.media.cameraOn, micOn: state.media.micOn });
    uiFromState();
  };
  ui.localLang.onchange = () => {
    const lang = ui.localLang.value || 'auto';
    if (lang === state.session.localLang) return;
    state.session.localLang = lang;
    localStorage.setItem('2vid.localLang', lang);
    postEvent('presence', { status: state.presence.local, name: state.session.localName, lang, cameraOn: state.media.cameraOn, micOn: state.media.micOn });
    if (state.cc.enabled) {
      stopCCCapture();
      startCCCapture();
    }
    uiFromState();
  };

  ui.callBtn.onclick = () => state.call.joined ? leaveCall() : joinCall();
  ui.camBtn.onclick = () => setCamera(!state.media.cameraOn);
  ui.micBtn.onclick = () => setMic(!state.media.micOn);
  ui.ccBtn.onclick = () => toggleCC(!state.cc.enabled);
  ui.toggleTranscriptBtn.onclick = async () => {
    state.transcript.visible = !state.transcript.visible;
    if (!state.transcript.visible) await toggleCC(false);
    uiFromState();
  };
  ui.exportTxt.onclick = () => download(`2vid-${sessionId}.txt`, exportText(), 'text/plain');
  ui.exportJson.onclick = () => download(`2vid-${sessionId}.json`, exportJson(), 'application/json');
  for (const [code, label] of LANGS) {
    const o = document.createElement('option');
    o.value = code;
    o.textContent = label;
    ui.localLang.appendChild(o);
  }

  window.addEventListener('storage', onStorage);
  if (chan) chan.onmessage = (e) => handleSignal(e.data);
  setInterval(() => Object.values(dedupe).forEach(c => c.sweep()), 15_000);
  window.addEventListener('beforeunload', () => { if (state.call.joined) leaveCall(); else postEvent('presence', { status: 'offline', name: state.session.localName }); });

  // Compatibility globals that route to minimal internals.
  window.toggleCall = () => state.call.joined ? leaveCall() : joinCall();
  window.toggleCamera = () => setCamera(!state.media.cameraOn);
  window.toggleMic = () => setMic(!state.media.micOn);
  window.toggleCC = (enabled) => toggleCC(typeof enabled === 'boolean' ? enabled : !state.cc.enabled);
  window.exportTranscriptText = exportText;
  window.exportTranscriptJSON = exportJson;

  postEvent('presence', { status: state.presence.local, name: state.session.localName, lang: state.session.localLang, cameraOn: state.media.cameraOn, micOn: state.media.micOn });
  uiFromState();
})();
</script>
</body>
</html>
