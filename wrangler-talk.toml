name = "talk-signal"
main = "worker-talk.js"
compatibility_date = "2024-12-01"

[[durable_objects.bindings]]
name = "TALK_SESSION"
class_name = "TalkSession"

[[migrations]]
tag = "v1"
new_classes = ["TalkSession"]
```

Then add `worker-talk.js` to the root of the repo. Push both files. Then in your Cloudflare dashboard go to the `talk-signal` Worker → Settings → Build and set the deploy command to:
```
npx wrangler deploy --config wrangler-talk.toml

